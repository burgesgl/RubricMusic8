.wrap{max-width:100%;margin:0 auto;padding:12px}

table.sh td{padding:4px 6px;border:1px solid #2a2a42;background:#12121f;text-align:center}

// === RUBRIC BUILDERS ===
function buildRubric(cr,hz,scPath,redrawFn){
const lv=hz?[4,3,2,1,0]:[4,3,2,1];
let h=`<div class="rt-title">Click a cell to score, fine-tune with slider</div><table class="rt"><thead><tr><th></th>`;
lv.forEach(n=>h+=`<th>${n}</th>`);h+=`</tr></thead><tbody>`;
cr.forEach(c=>{const v=tmp.sc[c.id];const vn=v!==undefined&&v!==null?v:-1;const base=vn>=0?Math.ceil(vn-0.001):99;
h+=`<tr><td>${c.name}</td>`;lv.forEach(n=>{const hi=(vn>=0&&Math.ceil(vn-0.001)===n)?` s${n}`:'';h+=`<td class="pick${hi}" onclick="mB('${c.id}',${n},'${redrawFn}')">${c['d'+n]||''}</td>`});h+=`</tr>`;
if(vn>=0){const mn=hz?(base===0?0:base-1+0.1):(base===1?1:base-1+0.1);
h+=`<tr><td colspan="${lv.length+1}"><div class="mp"><span class="lbl">${c.name}:</span><span class="val" id="mpv_${c.id}">${vn.toFixed(1)}</span><input type="range" min="${mn}" max="${base}" step="0.1" value="${vn}" oninput="mS('${c.id}',this.value)"><button class="clr" onclick="mC('${c.id}','${redrawFn}')">Clear</button></div></td></tr>`}});
return h+`</tbody></table>`}
function buildRubricFor(cr,hz,sn){
const lv=hz?[4,3,2,1,0]:[4,3,2,1];const se=tmp.entries[sn];
let h=`<table class="rt"><thead><tr><th></th>`;lv.forEach(n=>h+=`<th>${n}</th>`);h+=`</tr></thead><tbody>`;
cr.forEach(c=>{const v=se.sc[c.id];const vn=v!==undefined&&v!==null?v:-1;const base=vn>=0?Math.ceil(vn-0.001):99;
h+=`<tr><td>${c.name}</td>`;lv.forEach(n=>{const hi=(vn>=0&&Math.ceil(vn-0.001)===n)?` s${n}`:'';h+=`<td class="pick${hi}" onclick="mBM('${esc(sn)}','${c.id}',${n})">${c['d'+n]||''}</td>`});h+=`</tr>`;
if(vn>=0){const mn=hz?(base===0?0:base-1+0.1):(base===1?1:base-1+0.1);
h+=`<tr><td colspan="${lv.length+1}"><div class="mp"><span class="lbl">${c.name}:</span><span class="val" id="mpv_${c.id}">${vn.toFixed(1)}</span><input type="range" min="${mn}" max="${base}" step="0.1" value="${vn}" oninput="mSM('${esc(sn)}','${c.id}',this.value)"><button class="clr" onclick="mCM('${esc(sn)}','${c.id}')">Clear</button></div></td></tr>`}});
return h+`</tbody></table>`}
function mB(c,n,fn){tmp.sc[c]=n;window[fn]()}
function mS(c,v){tmp.sc[c]=parseFloat(parseFloat(v).toFixed(1));const e=document.getElementById('mpv_'+c);if(e)e.textContent=tmp.sc[c].toFixed(1);const a=avg(tmp.sc);const ae=document.querySelector('.ma .big');if(ae)ae.textContent=a!==null?a.toFixed(2):'\u2014'}
function mC(c,fn){delete tmp.sc[c];window[fn]()}
function mBM(sn,c,n){if(!tmp.entries[sn])tmp.entries[sn]={sc:{},nt:''};tmp.entries[sn].sc[c]=n;dMMulti()}
function mSM(sn,c,v){if(!tmp.entries[sn])return;tmp.entries[sn].sc[c]=parseFloat(parseFloat(v).toFixed(1));const e=document.getElementById('mpv_'+c);if(e)e.textContent=tmp.entries[sn].sc[c].toFixed(1);const a=avg(tmp.entries[sn].sc);const ae=document.querySelector('.ma .big');if(ae)ae.textContent=a!==null?a.toFixed(2):'\u2014'}
function mCM(sn,c){if(!tmp.entries[sn])return;delete tmp.entries[sn].sc[c];dMMulti()}

function closeSpin(){document.getElementById('spinOv').classList.remove('open');if(spinTimer)clearInterval(spinTimer)}
function drawSpin(){
  const el=document.getElementById('spinBody');
  let h=`<div class="spin-wrap">`;
  h+=`<div class="spin-display" id="spinDisp">Press Spin!</div>`;
  h+=`<div><button class="spin-btn" onclick="doSpin()">&#127922; SPIN</button>`;
  h+=`<button class="spin-btn again" onclick="resetSpin()">Reset</button></div>`;
  if(spinHistory.length){h+=`<div class="spin-history"><strong>History:</strong>`;spinHistory.forEach((n,i)=>h+=`<div>${i+1}. ${n}</div>`);h+=`</div>`}
  h+=`<div style="margin-top:10px;font-size:.78em;color:#555">${spinNames.length} names remaining</div>`;
  h+=`</div>`;el.innerHTML=h;
}
function doSpin(){
  if(!spinNames.length){document.getElementById('spinDisp').textContent='No names left!';return}
  const disp=document.getElementById('spinDisp');
  disp.classList.add('spinning');
  let count=0;const total=20+Math.floor(Math.random()*10);
  if(spinTimer)clearInterval(spinTimer);
  spinTimer=setInterval(()=>{
    disp.textContent=spinNames[Math.floor(Math.random()*spinNames.length)];
    count++;if(count>=total){
      clearInterval(spinTimer);spinTimer=null;
      const idx=Math.floor(Math.random()*spinNames.length);
      const pick=spinNames.splice(idx,1)[0];
      disp.textContent=pick;disp.classList.remove('spinning');
      spinHistory.push(pick);drawSpin();
      document.getElementById('spinDisp').textContent=pick;
      document.getElementById('spinDisp').style.color='#1b7340';
      setTimeout(()=>{const d=document.getElementById('spinDisp');if(d)d.style.color='#e8740c'},1500);
    }
  },80);
}
function resetSpin(){
  const p=pg();
  if(p&&p.type!=='lists')spinNames=[...getRoster()].filter(n=>n!=='Student, Tester');
  else{/* handled by caller */}
  spinHistory=[];drawSpin();
}

  else{LISTS.forEach((lst,i)=>{
    h+=`<div class="list-card"><div class="list-header" onclick="toggleListExpand(${i})"><div><span class="list-name">${lst.name}</span></div><span class="list-count">${lst.members.length} students</span></div>`;
    h+=`<div class="list-members">${lst.members.map(m=>{const src=ALL_SOURCES.find(s=>s.roster.includes(m));return`<span class="list-tag">${src?'<span class="src-label">'+src.label+'</span>':''}${m}</span>`}).join('')}</div>`;
    h+=`<div class="list-actions"><button class="spin" onclick="openSpinList(LISTS[${i}].members,LISTS[${i}].name)">&#127922; Spin</button><button onclick="editList(${i})">Edit</button><button onclick="deleteList(${i})">Delete</button></div></div>`;
  })}
  el.innerHTML=h;
}
function newList(){ei=null;tmp={name:'',members:[]};document.getElementById('mt').textContent='New List';dMList();document.getElementById('ov').classList.add('open')}
function editList(i){ei=i;tmp={name:LISTS[i].name,members:[...LISTS[i].members]};document.getElementById('mt').textContent='Edit: '+LISTS[i].name;dMList();document.getElementById('ov').classList.add('open')}
function deleteList(i){if(!confirm('Delete "'+LISTS[i].name+'"?'))return;LISTS.splice(i,1);svL();dpLists()}

function dMList(){
  const el=document.getElementById('mb');
  let h=`<div class="sl">List Name</div><input class="gi" value="${tmp.name}" oninput="tmp.name=this.value" placeholder="e.g. Group Lessons - Trumpet, Sectionals...">`;
  ALL_SOURCES.forEach(src=>{
    h+=`<div class="sl" style="margin-top:10px">${src.label}</div><div class="pks">`;
    src.roster.forEach(s=>{if(s==='Student, Tester')return;const me=tmp.members.includes(s);
    h+=`<button class="pk ${me?'in':''}" onclick="togListMember('${esc(s)}')">${s.split(',')[0]}</button>`});
    h+=`</div>`;
  });
  h+=`<div style="margin-top:10px;font-size:.82em;color:#888">${tmp.members.length} students selected</div>`;
  h+=`<div class="mf" style="margin-top:12px">`;
  if(ei!==null)h+=`<button class="dl" onclick="deleteList(${ei});closeM()">Delete</button>`;
  h+=`<button class="ca" onclick="closeM()">Cancel</button><button class="sv" onclick="saveList()">Save</button></div>`;
  el.innerHTML=h;
}
function togListMember(s){const i=tmp.members.indexOf(s);if(i>=0)tmp.members.splice(i,1);else tmp.members.push(s);dMList()}
function saveList(){if(!tmp.name.trim()){alert('Enter a list name.');return}if(!tmp.members.length){alert('Add students.');return}
const o={name:tmp.name.trim(),members:[...tmp.members]};if(ei!==null)LISTS[ei]=o;else LISTS.push(o);svL();dp();closeM()}

// === EXPORT ===
function eC(){
const p=pg(),cr=p.crit;let csv='';
if(p.type==='podcast'){
csv='Student,Group,'+cr.map(c=>c.name).join(',')+',Average,Notes\n';
const st=getStore();getRoster().forEach(nm=>{const g=st.find(x=>x.m&&x.m.includes(nm));const sc=g?g.sc:{};const a=g?avg(g.sc):null;const nt=(g&&g.nt||'').replace(/"/g,'""').replace(/\n/g,' ');
csv+=`"${nm}","${g?g.n:''}",${cr.map(c=>sc[c.id]||'').join(',')},${a!==null?a.toFixed(2):''},"${nt}"\n`})
} else if(p.type==='multi'){
if(p.sections){p.sections.forEach(sec=>{const st=(DB[p.id]&&DB[p.id][sec.id])||[];if(!st.length)return;
csv+=`${sec.label}\nStudent,${st.map(a=>a.aname).join(',')}\n`;
sec.roster.forEach(nm=>{csv+=`"${nm}"`;st.forEach(a=>{const e=a.entries&&a.entries[nm];const av=e?avg(e.sc):null;csv+=`,${av!==null?av.toFixed(2):''}`});csv+='\n'});csv+='\n'})}
}
if(!csv){alert('Nothing to export.');return}
const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${cp}_grades_${cs||'all'}_${new Date().toISOString().slice(0,10)}.csv`;a.click()}
function eJ(){
const exp={DB,LISTS};
const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(exp,null,2)],{type:'application/json'}));a.download=`grader_backup_${new Date().toISOString().slice(0,10)}.json`;a.click()}
function iJ(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(confirm('Replace ALL data?')){if(d.DB)DB=d.DB;else DB=d;if(d.LISTS)LISTS=d.LISTS;sv();svL();render()}}catch(x){alert('Bad file')}};r.readAsText(f);e.target.value=''}
function clr(){if(!confirm('Clear '+pg().label+(cs?' ('+cs+')':'')+'?'))return;const p=pg();if(p.sections){if(DB[p.id])DB[p.id][cs]=[]}else DB[p.id]=[];sv();dp()}

init();
</script>
